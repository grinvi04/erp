spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:tc:postgresql:16:///erp_test}
    username: ${SPRING_DATASOURCE_USERNAME:erp_ci}
    password: ${SPRING_DATASOURCE_PASSWORD:erp_ci_pass}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: WARN
    com.erp: INFO
