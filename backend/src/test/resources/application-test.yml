spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:tc:postgresql:16:///erp_test}
    username: ${SPRING_DATASOURCE_USERNAME:erp_ci}
    password: ${SPRING_DATASOURCE_PASSWORD:erp_ci_pass}
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        tenant_identifier_resolver: com.erp.common.tenant.TenantIdentifierResolver

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/erp  # MockMvc에서 JWT 직접 주입하므로 실제 연결 안 함

logging:
  level:
    root: WARN
    com.erp: INFO
