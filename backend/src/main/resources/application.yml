server:
  # Railway·컨테이너 환경은 PORT를 주입한다 — 이를 바인딩(로컬 기본 8080).
  port: ${PORT:8080}

spring:
  application:
    name: erp-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/erp}
    username: ${SPRING_DATASOURCE_USERNAME:erp}
    password: ${SPRING_DATASOURCE_PASSWORD:erp}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    # 영속성 컨텍스트를 뷰 렌더까지 열어두는 안티패턴 비활성화.
    # DTO 매핑은 @Transactional 서비스 내 Response.from()으로 끝나므로 안전.
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    out-of-order: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/erp}

  # 목록 엔드포인트 하드닝: 클라이언트가 거대 page size를 요청해도 100으로 상한 적용.
  data:
    web:
      pageable:
        max-page-size: 100

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  pattern:
    # 모든 로그 줄에 traceId 자동 포함 (MDC) — 없으면 빈 값.
    correlation: "[%X{traceId:-}] "
  level:
    root: INFO
    com.erp: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
