# 로컬 개발 인프라: PostgreSQL + Keycloak
# 앱(백엔드·프론트엔드)은 로컬에서 직접 실행한다.
#
# 사용법:
#   docker compose up -d
#   ./scripts/keycloak-setup.sh        # realm erp · client · 테스트 계정 (최초 1회·멱등)
#   헬스체크: curl -sf http://localhost:8080/actuator/health   (백엔드 기동 후)
#
# postgres 최초 기동 시 init 스크립트가 Keycloak용 `keycloak` 스키마를 생성한다
# (Keycloak 26은 KC_DB_SCHEMA 스키마를 자동 생성하지 않으므로 필수). 상세 셋업은 README.

services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_DB: erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 최초 기동 시 Keycloak 스키마 자동 생성 (docker compose down -v 후 재기동 시에도)
      - ./scripts/init-keycloak-schema.sql:/docker-entrypoint-initdb.d/init-keycloak-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: erp-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/erp
      KC_DB_USERNAME: erp
      KC_DB_PASSWORD: erp
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Keycloak 26 이미지에는 curl/wget이 없고 9000 health 엔드포인트도 기본 비활성이라
      # HTTP 프로브는 항상 실패(unhealthy 오탐)한다. 컨테이너 sh의 /dev/tcp로 8080 리슨을
      # TCP 프로브한다.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
