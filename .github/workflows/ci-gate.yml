# ci-gate — Spring Boot 백엔드 + Next.js 프론트엔드 (풀스택)
name: ci-gate

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: erp_ci
          POSTGRES_PASSWORD: erp_ci_pass
          POSTGRES_DB: erp_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erp_ci -d erp_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/erp_ci
      SPRING_DATASOURCE_USERNAME: erp_ci
      SPRING_DATASOURCE_PASSWORD: erp_ci_pass
      SPRING_PROFILES_ACTIVE: test

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: corretto
          cache: gradle

      - run: ./gradlew check

  frontend:
    runs-on: ubuntu-latest
    if: hashFiles('frontend/package.json') != ''

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run type-check --if-present
      - run: npm run lint
      - run: npm run build

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
