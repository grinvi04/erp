# ci-gate — Spring Boot 백엔드 + Next.js 프론트엔드 (풀스택)
name: ci-gate

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: erp_ci
          POSTGRES_PASSWORD: erp_ci_pass
          POSTGRES_DB: erp_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erp_ci -d erp_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/erp_ci
      SPRING_DATASOURCE_USERNAME: erp_ci
      SPRING_DATASOURCE_PASSWORD: erp_ci_pass
      SPRING_PROFILES_ACTIVE: test

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: corretto
          cache: gradle

      - run: ./gradlew check

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Check frontend is initialized
        id: check
        working-directory: '.'
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "initialized=true" >> $GITHUB_OUTPUT
          else
            echo "initialized=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v5
        if: steps.check.outputs.initialized == 'true'
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm install --ignore-scripts
        if: steps.check.outputs.initialized == 'true'
      - run: npm run type-check --if-present
        if: steps.check.outputs.initialized == 'true'
      - run: npm run lint
        if: steps.check.outputs.initialized == 'true'
      - run: npm run lint:design --if-present
        if: steps.check.outputs.initialized == 'true'
      - run: npm run build
        if: steps.check.outputs.initialized == 'true'

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # frontend 잡과 동일하게 npm install 사용(npm ci의 엄격한 lock 검증은 크로스
      # 플랫폼 optional dep 차이에 취약). 브라우저는 별도로 명시 설치한다.
      - run: npm install --ignore-scripts
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Run E2E (auth-gate smoke)
        run: npm run test:e2e
        env:
          CI: 'true'

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
